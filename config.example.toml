# SAKU Configuration
# Copy this file to config.toml and edit to match your environment.

[llm]
# Select which LLM profile to use (must match a profile name below)
active_profile = "local"

# Fallback settings (used if profiles are not defined or for backward compatibility)
api_url = "http://127.0.0.1:8080/v1/chat/completions"
api_key = ""
model = ""

# LLM Profiles - define multiple configurations and switch between them
[llm.profiles.local]
# Local llama.cpp server
api_url = "http://127.0.0.1:8080/v1/chat/completions"
api_key = ""
model = ""

[llm.profiles.openai]
# OpenAI API
api_url = "https://api.openai.com/v1/chat/completions"
api_key = ""  # Set your API key here or use OPENAI_API_KEY environment variable
model = "gpt-4o"

[llm.profiles.openrouter]
# OpenRouter API
api_url = "https://openrouter.ai/api/v1/chat/completions"
api_key = ""  # Set your API key here or use OPENAI_API_KEY environment variable
model = "anthropic/claude-3.5-sonnet"

[llm.profiles.anthropic]
# Anthropic API (via OpenRouter or direct)
api_url = "https://api.anthropic.com/v1/messages"
api_key = ""  # Set your API key here or use ANTHROPIC_API_KEY environment variable
model = "claude-3-5-sonnet-20240620"

[memory]
# Path to the memory directory, relative to this config file
# Default: memory/ in the repo root
root = "memory"

[agent]
max_history_messages = 30

[daemon]
chat_poll_seconds = 5
tick_interval_seconds = 1800          # Autonomous study/monologue tick (30 min)
inbox_poll_seconds = 3600             # Inbox scan interval (1 hour)
archive_after_inactive_seconds = 1800 # Archive chat after 30 min inactivity
archive_after_turns = 10              # Archive chat after 10 turns
auto_initiate_cooldown_seconds = 28800 # SAKU self-initiates every 8 hours
